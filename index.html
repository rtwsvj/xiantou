<h1>线头</h1>
<p>把复杂的事，一根一根理清楚。</p>
<p>当你感到焦虑、拖延、不知道从何开始时，摇一摇，抓住今天的线头，只做这一件小事。没有失败，没有打卡，只有温柔的陪伴。</p>

<h2>常见问题</h2>
<p><strong>我的数据存在哪里？</strong><br>全部在你自己的设备上。线头没有账号、没有服务器、不收集任何信息。</p>
<p><strong>「更聪明的解结」是什么？</strong><br>可选功能。你可以在设置里接入自己的 AI 服务（填入服务商的地址、模型与密钥）。不接入也完全够用——本地解结永远在线。</p>
<p><strong>删除 App 会怎样？</strong><br>所有数据随 App 一起从设备上消失。</p>
